name: base
channels:
  - conda-forge
dependencies:
  # --- Core Runtime ---
  - python=3.10
  - pip

  # --- Web & Kernel Infrastructure ---
  - fastapi               # <--- ADDED
  - uvicorn               # <--- ADDED
  - python-multipart      # <--- REQUIRED for file uploads
  - jupyter_client
  - ipykernel
  - jupyterlab

  # --- Math & Data Science ---
  - numpy
  - scipy
  - pandas
  - sympy
  - matplotlib

  # --- Optimization Frameworks ---
  - cvxpy
  - pyomo

  # --- CAD Geometry ---
  # Note: cadquery and cadquery-ocp are installed in Dockerfile in a specific order:
  # 1. cadquery-ocp from conda-forge
  # 2. ezdxf via pip (not available in conda-forge)
  # 3. cadquery from conda-forge with --no-deps
  # - cadquery=2.6
  # - cadquery-ocp

  # --- Binary Solvers ---
  - ipopt
  - highs
  - glpk
  - pip:
    - highspy  # Python interface for HiGHS solver (required by Pyomo)