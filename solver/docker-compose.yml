services:
  # ----------------------------
  # 1. The Main Backend (API/DB)
  # ----------------------------
  backend:
    build:
      context: backend
      dockerfile: Dockerfile.backend
    container_name: local-backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - EXECUTOR_HOST=http://executor:8000

  # ----------------------------
  # 2. The Math Executor (FULLY DISABLED)
  # ----------------------------
  executor:
    build:
      context: backend
      dockerfile: Dockerfile.executor
    container_name: local-executor
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - PORT=8000

  # ----------------------------
  # 3. The Vite Frontend
  # ----------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: local-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
      # - executor <-- Commented out to prevent dependency errors